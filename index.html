<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Saver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="popup" role="application" aria-label="URL Saver">

    <!-- Header -->
    <header class="header">
      <div class="header__left">
        <h1 class="header__title">URL Saver</h1>
        <span id="preview-badge" class="preview-badge" hidden>Preview data</span>
      </div>
      <div class="header__actions">
        <button id="view-toggle-btn" class="icon-btn" type="button" aria-label="Switch to list view" title="Toggle orbit / list view">
          <svg id="view-toggle-icon" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="2.4" fill="currentColor"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open settings menu">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="5" cy="12" r="2" fill="currentColor" />
            <circle cx="12" cy="12" r="2" fill="currentColor" />
            <circle cx="19" cy="12" r="2" fill="currentColor" />
          </svg>
        </button>

        <div id="settings-menu" class="settings-menu" hidden role="menu" aria-label="Settings">
          <button id="storage-toggle" class="settings-menu__item" role="menuitemradio" aria-checked="false" type="button">
            <span id="storage-toggle-label">Storage: Local</span>
          </button>
          <button id="export-btn" class="settings-menu__item" role="menuitem" type="button">Export links (.json)</button>
          <button id="clear-all-btn" class="settings-menu__item settings-menu__item--danger" role="menuitem" type="button">Delete all links</button>
        </div>
      </div>
    </header>

    <!-- Search -->
    <div class="search">
      <svg class="search__icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none" />
        <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <input id="search-input" type="text" placeholder="Filter saved links…" aria-label="Filter saved links" autocomplete="off" />
    </div>

    <!-- Orbit view -->
    <section id="orbit-view" class="orbit-view">
      <div id="orbit-stage" class="orbit-stage">
        <div id="orbit-ring" class="orbit-ring" aria-hidden="true"></div>
        <button id="orbit-hub" class="orbit-hub" type="button" aria-label="View all saved links">
          <span id="orbit-hub-count" class="orbit-hub__count">0</span>
          <span class="orbit-hub__label">links</span>
        </button>
        <!-- category nodes injected here by JS -->
      </div>
      <div id="orbit-empty" class="orbit-empty">
        <p class="orbit-empty__title">Your orbit is empty</p>
        <p class="orbit-empty__hint">Save a link below and watch it find its category.</p>
      </div>
    </section>

    <!-- List view -->
    <section id="list-view" class="list-view" hidden>
      <button id="back-to-orbit-btn" class="back-btn" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="list-view-title">All links</span>
      </button>
      <ul id="list" class="list" aria-live="polite"></ul>
      <div id="empty-state" class="empty-state" hidden>
        <p class="empty-state__title">No links here yet</p>
        <p class="empty-state__hint">Saved links in this category will show up here.</p>
      </div>
    </section>

    <!-- Primary action -->
    <button id="save-btn" class="save-btn" type="button" aria-label="Save current tab URL">
      <svg class="save-btn__icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
      </svg>
      <span class="save-btn__label">Save current URL</span>
    </button>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </div>

  <!-- GSAP is bundled locally (vendor/gsap.min.js) — never loaded from a CDN.
       This keeps our Content-Security-Policy at "script-src 'self'" and
       means the extension has no runtime dependency on a third-party host. -->
  <script src="vendor/gsap.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
